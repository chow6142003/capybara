<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Photobooth Capybara STEAM 2026</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: #fceff9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    display:flex;
    gap:20px;
}

video {
    width:400px;
    border-radius:20px;
    border:5px solid #333;
}

.controls {
    text-align:center;
}

button {
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:10px;
    background:#ff69b4;
    color:white;
    cursor:pointer;
    font-size:16px;
}

select {
    padding:5px;
}

#countdown {
    position:absolute;
    font-size:100px;
    color:white;
    text-shadow:0 0 10px black;
}

.strip {
    width:220px;
    padding:10px;
    border-radius:20px;
    background:white;
    text-align:center;
}

.photo {
    width:100%;
    margin:5px 0;
    border-radius:10px;
}

canvas {
    display:none;
}

</style>
</head>

<body>

<div class="container">

<div>
    <video id="video" autoplay></video>
    <div id="countdown"></div>

    <div class="controls">
        <button onclick="startCapture()">START 📸</button><br>

        Frame:
        <select id="frameColor">
            <option value="#ffffff">Putih</option>
            <option value="#ffd1dc">Pink</option>
            <option value="#d1f0ff">Biru</option>
            <option value="#d1ffd6">Hijau</option>
            <option value="#fff0b3">Kuning</option>
        </select>
    </div>
</div>

<div class="strip" id="strip">
    <h3>Pameran STEAM 2026</h3>
    <img src="https://i.imgur.com/4AiXzf8.png" width="60">
    <div id="photos"></div>
</div>

</div>

<canvas id="canvas"></canvas>

<audio id="shutter" src="https://www.soundjay.com/camera/camera-shutter-click-01.mp3"></audio>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const photosDiv = document.getElementById("photos");
const countdownEl = document.getElementById("countdown");
const shutter = document.getElementById("shutter");

let photos = [];

// Webcam
navigator.mediaDevices.getUserMedia({ video:true })
.then(stream => video.srcObject = stream);

// Capture process
async function startCapture() {
    photos = [];
    photosDiv.innerHTML = "";

    for(let i=0;i<4;i++) {
        await countdown(3);
        takePhoto();
        await sleep(500);
    }
}

// Countdown
function countdown(seconds) {
    return new Promise(resolve=>{
        let count = seconds;
        countdownEl.innerText = count;

        let interval = setInterval(()=>{
            count--;
            if(count<=0){
                clearInterval(interval);
                countdownEl.innerText = "";
                resolve();
            } else {
                countdownEl.innerText = count;
            }
        },1000);
    });
}

// Take photo
function takePhoto() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0);

    let data = canvas.toDataURL("image/png");
    photos.push(data);

    shutter.play();

    let img = document.createElement("img");
    img.src = data;
    img.className = "photo";

    photosDiv.appendChild(img);
}

// Download strip
function downloadStrip() {

    let stripCanvas = document.createElement("canvas");
    let sctx = stripCanvas.getContext("2d");

    let width = 400;
    let height = 1200;

    stripCanvas.width = width;
    stripCanvas.height = height;

    let frameColor = document.getElementById("frameColor").value;

    sctx.fillStyle = frameColor;
    sctx.fillRect(0,0,width,height);

    let y = 50;

    photos.forEach(p=>{
        let img = new Image();
        img.src = p;

        img.onload = ()=>{
            sctx.drawImage(img,50,y,300,200);
        }

        y += 250;
    });

    // text
    sctx.fillStyle="black";
    sctx.font="30px Arial";
    sctx.fillText("Pameran STEAM 2026",50,height-50);

    // download
    let link = document.createElement("a");
    link.download = "photostrip.png";
    link.href = stripCanvas.toDataURL();
    link.click();
}

// Add download button
let btn = document.createElement("button");
btn.innerText = "Download";
btn.onclick = downloadStrip;
document.querySelector(".controls").appendChild(btn);

// Sleep
function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}

</script>

</body>
</html>
