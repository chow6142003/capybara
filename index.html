<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Capybara Photobooth</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#fff4dc,#ffe6f2,#e6f7ff);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* MAIN LAYOUT */
.container{
    display:flex;
    gap:40px;
    align-items:center;
    flex-wrap:wrap;
}

/* CAMERA SECTION */
.camera-section{
    background:white;
    padding:20px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    text-align:center;
    width:500px;
    position:relative;
}

h1{
    font-family:'Pacifico', cursive;
    color:#8b5e3c;
    margin-bottom:15px;
    font-size:34px;
}

video{
    width:100%;
    border-radius:20px;
    border:8px solid #ffd59e;
    transform:scaleX(-1);
}

/* COUNTDOWN */
#countdown{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:120px;
    font-weight:bold;
    color:white;
    text-shadow:0 0 20px black;
    display:none;
    z-index:10;
}

/* BUTTONS */
.controls{
    margin-top:20px;
}

button{
    padding:12px 22px;
    margin:5px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

#startBtn{
    background:#ffb347;
    color:white;
}

#downloadBtn{
    background:#6c63ff;
    color:white;
}

/* COLOR CHOICES */
.colors{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.color-btn{
    width:35px;
    height:35px;
    border-radius:50%;
    border:3px solid white;
    cursor:pointer;
    box-shadow:0 0 5px rgba(0,0,0,0.3);
}

/* PHOTO STRIP */
/* 13cm x 6cm */
.photostrip{
    width:6cm;
    height:13cm;
    background:#ffb6c1;
    border-radius:20px;
    padding:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    position:relative;
}

/* TITLE */
.strip-title{
    font-family:'Pacifico', cursive;
    font-size:20px;
    color:white;
    text-align:center;
    margin-bottom:10px;
    text-shadow:2px 2px 5px rgba(0,0,0,0.3);
}

/* PHOTO FRAME */
/* 3cm x 5.5cm */
.photo-frame{
    width:3cm;
    height:5.5cm;
    background:white;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:8px;
    border:4px solid white;
}

.photo-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

/* CAPYBARA DECOR */
.capy{
    position:absolute;
    bottom:5px;
    font-size:32px;
}

/* RESPONSIVE */
@media(max-width:900px){
    .container{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- CAMERA -->
    <div class="camera-section">

        <h1>Capybara Photobooth</h1>

        <div id="countdown">3</div>

        <video id="video" autoplay playsinline></video>

        <canvas id="canvas" style="display:none;"></canvas>

        <div class="controls">
            <button id="startBtn">📸 Start Photo Booth</button>
            <button id="downloadBtn">⬇ Download Strip</button>
        </div>

        <!-- COLOR OPTIONS -->
        <div class="colors">

            <div class="color-btn" style="background:red" data-color="red"></div>
            <div class="color-btn" style="background:yellow" data-color="yellow"></div>
            <div class="color-btn" style="background:green" data-color="green"></div>
            <div class="color-btn" style="background:pink" data-color="pink"></div>
            <div class="color-btn" style="background:purple" data-color="purple"></div>
            <div class="color-btn" style="background:black" data-color="black"></div>
            <div class="color-btn" style="background:orange" data-color="orange"></div>
            <div class="color-btn" style="background:lightblue" data-color="lightblue"></div>
            <div class="color-btn" style="background:maroon" data-color="maroon"></div>

        </div>

    </div>

    <!-- PHOTO STRIP -->
    <div class="photostrip" id="photostrip">

        <div class="strip-title">
            STEAM Exhibition 2026
        </div>

        <div class="photo-frame">
            <img id="photo0">
        </div>

        <div class="photo-frame">
            <img id="photo1">
        </div>

        <div class="photo-frame">
            <img id="photo2">
        </div>

        <div class="photo-frame">
            <img id="photo3">
        </div>

        <div class="capy">🦫</div>

    </div>

</div>

<!-- CAMERA SOUND -->
<audio id="cameraSound">
<source src="https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3">
</audio>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const countdown = document.getElementById('countdown');
const startBtn = document.getElementById('startBtn');
const downloadBtn = document.getElementById('downloadBtn');
const strip = document.getElementById('photostrip');
const sound = document.getElementById('cameraSound');

let photos = [];

/* START CAMERA */
navigator.mediaDevices.getUserMedia({
    video:true,
    audio:false
})
.then(stream=>{
    video.srcObject = stream;
});

/* COLOR CHANGE */
document.querySelectorAll('.color-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
        strip.style.background = btn.dataset.color;
    });
});

/* COUNTDOWN */
function startCountdown(){
    return new Promise(resolve=>{

        let count = 3;

        countdown.style.display = 'block';
        countdown.innerText = count;

        const interval = setInterval(()=>{

            count--;

            if(count > 0){
                countdown.innerText = count;
            }else{
                clearInterval(interval);
                countdown.style.display = 'none';
                resolve();
            }

        },1000);

    });
}

/* TAKE PHOTO */
function takePhoto(index){

    const context = canvas.getContext('2d');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    context.translate(canvas.width,0);
    context.scale(-1,1);

    context.drawImage(video,0,0);

    const data = canvas.toDataURL('image/png');

    document.getElementById(`photo${index}`).src = data;

    photos.push(data);

    sound.play();
}

/* PHOTO SESSION */
startBtn.addEventListener('click', async ()=>{

    photos = [];

    for(let i=0;i<4;i++){

        await startCountdown();

        takePhoto(i);

        await new Promise(r=>setTimeout(r,700));
    }

});

/* DOWNLOAD */
downloadBtn.addEventListener('click',()=>{

    html2canvas(strip).then(canvas=>{

        const link = document.createElement('a');

        link.download = 'STEAM-Photostrip.png';

        link.href = canvas.toDataURL();

        link.click();

    });

});

</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
