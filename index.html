<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEAM Exhibition 2026 - Online Photo Booth</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family: Arial, sans-serif;
      background:#f2f2f2;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      gap:30px;
    }

    .container{
      display:flex;
      gap:30px;
      align-items:flex-start;
    }

    /* CAMERA SECTION */
    .camera-box{
      background:white;
      padding:20px;
      border-radius:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
      text-align:center;
    }

    video{
      width:500px;
      height:375px;
      border-radius:15px;
      object-fit:cover;
      transform: scaleX(-1); /* Front Camera Mirror */
      background:black;
    }

    .controls{
      margin-top:15px;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      margin:5px;
      background:#222;
      color:white;
    }

    select{
      padding:10px;
      border-radius:10px;
      font-size:16px;
    }

    #countdown{
      font-size:80px;
      color:red;
      font-weight:bold;
      margin-top:10px;
      height:90px;
    }

    /* PHOTO STRIP */
    .photo-strip{
      width:240px; /* 6cm equivalent */
      height:480px; /* 12cm equivalent */
      border-radius:20px;
      padding:15px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      position:relative;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
    }

    .title{
      font-family:"Bauhaus 93", cursive;
      font-size:20px;
      text-align:center;
      margin-bottom:10px;
      color:white;
      text-shadow:2px 2px 4px black;
    }

    .frame{
      width:120px;   /* 3cm equivalent */
      height:240px;  /* 6cm equivalent */
      background:white;
      margin:5px 0;
      border-radius:10px;
      overflow:hidden;
      border:4px solid white;
    }

    .frame img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    #downloadBtn{
      margin-top:15px;
      background:#0a84ff;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- CAMERA -->
  <div class="camera-box">
    <video id="video" autoplay playsinline></video>

    <div id="countdown"></div>

    <div class="controls">
      <select id="bgColor">
        <option value="red">Red</option>
        <option value="yellow">Yellow</option>
        <option value="green">Green</option>
        <option value="lightgreen">Light Green</option>
        <option value="pink">Pink</option>
        <option value="purple">Purple</option>
        <option value="black">Black</option>
        <option value="orange">Orange</option>
        <option value="darkblue">Dark Blue</option>
        <option value="lightblue">Light Blue</option>
        <option value="maroon">Maroon</option>
      </select>

      <button onclick="startPhotoBooth()">Start Photo Booth</button>
      <button id="downloadBtn" onclick="downloadStrip()">Download</button>
    </div>
  </div>

  <!-- PHOTO STRIP -->
  <div class="photo-strip" id="photoStrip">
    <div class="title">STEAM Exhibition 2026</div>

    <div class="frame"><img id="photo1"></div>
    <div class="frame"><img id="photo2"></div>
    <div class="frame"><img id="photo3"></div>
    <div class="frame"><img id="photo4"></div>
  </div>

</div>

<canvas id="canvas" width="500" height="375" style="display:none;"></canvas>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const countdown = document.getElementById('countdown');

  const frames = [
    document.getElementById('photo1'),
    document.getElementById('photo2'),
    document.getElementById('photo3'),
    document.getElementById('photo4')
  ];

  // START FRONT CAMERA
  async function startCamera(){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{
          facingMode:"user"
        },
        audio:false
      });

      video.srcObject = stream;
    }catch(error){
      alert("Camera access denied!");
      console.error(error);
    }
  }

  startCamera();

  // CHANGE PHOTO STRIP COLOR
  document.getElementById('bgColor').addEventListener('change', function(){
    document.getElementById('photoStrip').style.background = this.value;
  });

  document.getElementById('photoStrip').style.background = "red";

  // COUNTDOWN FUNCTION
  function countdownTimer(seconds){
    return new Promise((resolve)=>{
      let counter = seconds;

      countdown.innerHTML = counter;

      const interval = setInterval(()=>{
        counter--;
        countdown.innerHTML = counter;

        if(counter <= 0){
          clearInterval(interval);
          countdown.innerHTML = "";
          resolve();
        }
      },1000);
    });
  }

  // TAKE PHOTO
  async function capturePhoto(index){

    await countdownTimer(3);

    ctx.save();

    // Mirror image correctly
    ctx.translate(canvas.width,0);
    ctx.scale(-1,1);

    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    ctx.restore();

    const imageData = canvas.toDataURL("image/png");
    frames[index].src = imageData;
  }

  // START PHOTO BOOTH
  async function startPhotoBooth(){

    for(let i=0; i<4; i++){
      await capturePhoto(i);
    }

    alert("Photo Strip Completed!");
  }

  // DOWNLOAD PHOTO STRIP
  function downloadStrip(){

    html2canvas(document.getElementById('photoStrip')).then(canvas=>{

      const link = document.createElement('a');
      link.download = 'STEAM-Exhibition-2026-PhotoStrip.png';
      link.href = canvas.toDataURL();
      link.click();

    });
  }
</script>

<!-- html2canvas Library -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
