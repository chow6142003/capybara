<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photobooth STEAM 2026</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#ffe0f0,#e0f7ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    display:flex;
    gap:20px;
}

/* VIDEO */
video{
    width:420px;
    border-radius:20px;
    border:5px solid #333;
}

/* STRIP */
.strip{
    width:240px;
    background:white;
    padding:10px;
    border-radius:20px;
    text-align:center;
    position:relative;
}

/* PHOTOS */
.photo{
    width:100%;
    margin:6px 0;
    border-radius:10px;
}

/* COUNTDOWN */
#countdown{
    position:absolute;
    font-size:120px;
    color:white;
    font-weight:bold;
    text-shadow:0 0 20px black;
    animation: pop 1s ease;
}

@keyframes pop{
    0%{transform:scale(0.3);opacity:0;}
    100%{transform:scale(1);opacity:1;}
}

/* BUTTON */
button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:12px;
    background:#ff6fa5;
    color:white;
    cursor:pointer;
}

select{
    padding:5px;
    border-radius:8px;
}

/* STICKERS */
.sticker{
    width:60px;
    position:absolute;
}

.controls{
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div>
    <video id="video" autoplay></video>
    <div id="countdown"></div>

    <div class="controls">
        <button onclick="startCapture()">START 📸</button><br>

        Frame:
        <select id="frameColor">
            <option value="#ffffff">White</option>
            <option value="#ffd1dc">Pink</option>
            <option value="#d1f0ff">Blue</option>
            <option value="#d1ffd6">Green</option>
            <option value="#fff0b3">Yellow</option>
        </select>

        <br>
        <button onclick="downloadStrip()">Download PNG</button>
    </div>
</div>

<!-- PHOTOSTRIP -->
<div class="strip" id="strip">
    <h3>STEAM Exhibition 2026</h3>

    <!-- Capybara Stickers -->
    <img src="https://i.imgur.com/4AiXzf8.png" class="sticker" style="top:20px; left:10px;">
    <img src="https://i.imgur.com/4AiXzf8.png" class="sticker" style="bottom:20px; right:10px;">

    <div id="photos"></div>
</div>

</div>

<canvas id="canvas" style="display:none"></canvas>

<audio id="shutter" src="https://www.soundjay.com/camera/camera-shutter-click-01.mp3"></audio>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const photosDiv = document.getElementById("photos");
const countdownEl = document.getElementById("countdown");
const shutter = document.getElementById("shutter");

let photos = [];

/* WEBCAM */
navigator.mediaDevices.getUserMedia({video:true})
.then(stream => video.srcObject = stream);

/* START CAPTURE */
async function startCapture(){
    photos = [];
    photosDiv.innerHTML = "";

    for(let i=0;i<4;i++){
        await countdown(3);
        takePhoto();
        await sleep(500);
    }
}

/* COUNTDOWN */
function countdown(sec){
    return new Promise(resolve=>{
        let count = sec;
        countdownEl.innerText = count;

        let interval = setInterval(()=>{
            count--;
            if(count<=0){
                clearInterval(interval);
                countdownEl.innerText = "";
                resolve();
            }else{
                countdownEl.innerText = count;
            }
        },1000);
    });
}

/* TAKE PHOTO */
function takePhoto(){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0);

    let data = canvas.toDataURL("image/png");
    photos.push(data);

    shutter.currentTime = 0;
    shutter.play();

    let img = document.createElement("img");
    img.src = data;
    img.className = "photo";
    photosDiv.appendChild(img);
}

/* DOWNLOAD */
function downloadStrip(){
    let c = document.createElement("canvas");
    let cx = c.getContext("2d");

    let width = 400;
    let height = 1200;

    c.width = width;
    c.height = height;

    let frameColor = document.getElementById("frameColor").value;

    // Background frame
    cx.fillStyle = frameColor;
    cx.fillRect(0,0,width,height);

    let y = 50;

    // Load all images properly before export
    let loaded = 0;

    photos.forEach((p,index)=>{
        let img = new Image();
        img.src = p;

        img.onload = ()=>{
            cx.drawImage(img,50,y,300,200);
            loaded++;

            if(loaded === photos.length){
                drawExtras(cx, width, height);
            }
        }

        y += 250;
    });

    if(photos.length === 0){
        drawExtras(cx, width, height);
    }

    function drawExtras(cx,w,h){
        // TEXT
        cx.fillStyle="black";
        cx.font="28px Arial";
        cx.fillText("STEAM Exhibition 2026",40,h-40);

        // STICKERS
        let sticker1 = new Image();
        let sticker2 = new Image();

        sticker1.src = "https://i.imgur.com/4AiXzf8.png";
        sticker2.src = "https://i.imgur.com/4AiXzf8.png";

        sticker1.onload = ()=>{
            cx.drawImage(sticker1,10,10,80,80);

            sticker2.onload = ()=>{
                cx.drawImage(sticker2,w-90,h-120,80,80);

                // DOWNLOAD AFTER EVERYTHING READY
                let link = document.createElement("a");
                link.download = "photostrip.png";
                link.href = c.toDataURL();
                link.click();
            }
        }
    }
}

/* SLEEP */
function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}
</script>

</body>
</html>
