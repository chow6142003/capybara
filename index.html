<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Capybara Photobooth - STEAM Exhibition 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Fredoka', sans-serif;
    background:
    linear-gradient(135deg,#fff2f7,#e8f7ff,#fff6d6);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* MAIN LAYOUT */

.container{
    width:95%;
    max-width:1400px;
    display:flex;
    gap:40px;
    align-items:center;
    justify-content:center;
}

/* LEFT SIDE */

.left-panel{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

.camera-box{
    position:relative;
    width:700px;
    height:520px;
    border-radius:30px;
    overflow:hidden;
    border:10px solid white;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    background:#000;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

/* COUNTDOWN */

#countdown{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:140px;
    font-weight:700;
    color:white;
    text-shadow:0 0 20px black;
    display:none;
    z-index:10;
}

/* CAMERA LABEL */

.camera-label{
    position:absolute;
    top:20px;
    left:20px;
    background:rgba(255,255,255,0.85);
    padding:10px 20px;
    border-radius:20px;
    font-size:20px;
    font-weight:600;
}

/* CAPYBARA DECOR */

.capybara{
    position:absolute;
    font-size:60px;
    z-index:5;
}

.capy1{
    bottom:10px;
    left:15px;
}

.capy2{
    bottom:10px;
    right:15px;
}

/* BUTTONS */

.controls{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

button{
    border:none;
    border-radius:18px;
    padding:14px 26px;
    font-size:18px;
    font-family:'Fredoka', sans-serif;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.capture-btn{
    background:#ff8fb1;
    color:white;
}

.download-btn{
    background:#7b8cff;
    color:white;
}

/* FRAME COLORS */

.colors{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
    max-width:500px;
}

.color{
    width:42px;
    height:42px;
    border-radius:50%;
    cursor:pointer;
    border:4px solid white;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

/* RIGHT SIDE PHOTO STRIP */

.strip-container{
    display:flex;
    justify-content:center;
    align-items:center;
}

.photostrip{

    width:6cm;
    height:15cm;

    background:white;
    border:14px solid #ffb6c1;

    border-radius:30px;
    padding:12px;

    display:flex;
    flex-direction:column;
    align-items:center;

    gap:8px;

    box-shadow:0 10px 25px rgba(0,0,0,0.25);

    position:relative;
}

/* HEADER */

.strip-header{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-bottom:5px;
}

.logo{
    width:38px;
    height:38px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid white;
}

/* TITLE */

.title{
    text-align:center;
    font-size:13px;
    font-weight:700;
    line-height:1.2;
}

/* PHOTO FRAMES */

.photo{
    width:3cm;
    height:4cm;
    border-radius:15px;
    background:#f3f3f3;
    overflow:hidden;
    border:4px solid white;
    position:relative;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* PLACEHOLDER */

.placeholder{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
}

/* FOOTER */

.footer{
    margin-top:auto;
    font-size:12px;
    font-weight:600;
}

/* FLASH EFFECT */

.flash{
    animation:flash 0.3s;
}

@keyframes flash{
    0%{filter:brightness(3);}
    100%{filter:brightness(1);}
}

/* MOBILE */

@media(max-width:1100px){

    .container{
        flex-direction:column;
    }

    .camera-box{
        width:95vw;
        height:60vw;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- LEFT PANEL -->

    <div class="left-panel">

        <div class="camera-box">

            <div class="camera-label">
                📷 Front Camera
            </div>

            <video id="video" autoplay playsinline></video>

            <div id="countdown">3</div>

            <div class="capybara capy1">🦫</div>
            <div class="capybara capy2">🦫</div>

        </div>

        <!-- BUTTONS -->

        <div class="controls">

            <button class="capture-btn" onclick="startBooth()">
                📸 Start Photobooth
            </button>

            <button class="download-btn" onclick="downloadStrip()">
                ⬇ Download Strip
            </button>

        </div>

        <!-- COLORS -->

        <div class="colors">

            <div class="color" style="background:#ffb6c1" onclick="changeFrame('#ffb6c1')"></div>
            <div class="color" style="background:#ffd166" onclick="changeFrame('#ffd166')"></div>
            <div class="color" style="background:#95d5b2" onclick="changeFrame('#95d5b2')"></div>
            <div class="color" style="background:#a0c4ff" onclick="changeFrame('#a0c4ff')"></div>
            <div class="color" style="background:#cdb4db" onclick="changeFrame('#cdb4db')"></div>
            <div class="color" style="background:#f4a261" onclick="changeFrame('#f4a261')"></div>
            <div class="color" style="background:#ff87ab" onclick="changeFrame('#ff87ab')"></div>
            <div class="color" style="background:#84dcc6" onclick="changeFrame('#84dcc6')"></div>
            <div class="color" style="background:#bde0fe" onclick="changeFrame('#bde0fe')"></div>
            <div class="color" style="background:#ffc8dd" onclick="changeFrame('#ffc8dd')"></div>

        </div>

    </div>

    <!-- PHOTO STRIP -->

    <div class="strip-container">

        <div class="photostrip" id="photostrip">

            <!-- HEADER -->

            <div class="strip-header">

                <!-- REPLACE THIS IMAGE WITH SK MENUANG LOGO -->

                <img
                    class="logo"
                    src="https://upload.wikimedia.org/wikipedia/commons/8/89/HD_transparent_picture.png"
                    id="logo"
                >

                <div class="title">
                    STEAM Exhibition 2026
                </div>

            </div>

            <!-- PHOTOS -->

            <div class="photo">
                <img id="img0">
                <div class="placeholder" id="ph0">🦫</div>
            </div>

            <div class="photo">
                <img id="img1">
                <div class="placeholder" id="ph1">🦫</div>
            </div>

            <div class="photo">
                <img id="img2">
                <div class="placeholder" id="ph2">🦫</div>
            </div>

            <div class="photo">
                <img id="img3">
                <div class="placeholder" id="ph3">🦫</div>
            </div>

            <div class="footer">
                Cute Capybara Booth ✨
            </div>

        </div>

    </div>

</div>

<!-- CAMERA SOUND -->

<audio id="snapSound">
    <source src="https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3" type="audio/mpeg">
</audio>

<script>

const video = document.getElementById("video");
const countdown = document.getElementById("countdown");
const snapSound = document.getElementById("snapSound");

let photos = [];

/* START CAMERA */

navigator.mediaDevices.getUserMedia({
    video:{
        facingMode:"user"
    },
    audio:false
})
.then(stream=>{
    video.srcObject = stream;
});

/* CHANGE FRAME */

function changeFrame(color){
    document.getElementById("photostrip").style.borderColor = color;
}

/* COUNTDOWN */

function showCountdown(number){

    return new Promise(resolve=>{

        countdown.style.display = "block";
        countdown.innerText = number;

        let count = number;

        const interval = setInterval(()=>{

            count--;

            if(count > 0){
                countdown.innerText = count;
            }else{
                clearInterval(interval);
                countdown.style.display = "none";
                resolve();
            }

        },1000);

    });

}

/* TAKE PHOTO */

function takePhoto(index){

    return new Promise(resolve=>{

        const canvas = document.createElement("canvas");

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const ctx = canvas.getContext("2d");

        /* MIRROR */

        ctx.translate(canvas.width,0);
        ctx.scale(-1,1);

        ctx.drawImage(video,0,0);

        const data = canvas.toDataURL("image/png");

        photos[index] = data;

        document.getElementById("img"+index).src = data;

        document.getElementById("ph"+index).style.display = "none";

        snapSound.play();

        video.classList.add("flash");

        setTimeout(()=>{
            video.classList.remove("flash");
        },300);

        resolve();

    });

}

/* START PHOTOBOOTH */

async function startBooth(){

    photos = [];

    for(let i=0;i<4;i++){

        await showCountdown(3);

        await takePhoto(i);

    }

}

/* DOWNLOAD STRIP */

function downloadStrip(){

    const strip = document.getElementById("photostrip");

    html2canvas(strip,{
        scale:3
    }).then(canvas=>{

        const link = document.createElement("a");

        link.download = "STEAM-Exhibition-2026-Capybara-Booth.png";

        link.href = canvas.toDataURL();

        link.click();

    });

}

</script>

<!-- HTML2CANVAS -->

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
