<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STEAM Exhibition 2026 Photobooth</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#ffe6f0,#e6f7ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    display:flex;
    gap:20px;
}

/* CAMERA */
video{
    width:420px;
    border-radius:20px;
    border:5px solid #333;
}

/* PHOTOSTRIP */
.strip{
    width:240px;
    border-radius:20px;
    padding:10px;
    text-align:center;
    transition:0.3s;
}

.photo{
    width:100%;
    margin:6px 0;
    border-radius:10px;
}

/* COUNTDOWN */
#countdown{
    position:absolute;
    font-size:120px;
    color:white;
    font-weight:bold;
    text-shadow:0 0 20px black;
    animation: pop 0.8s ease;
}

@keyframes pop{
    0%{transform:scale(0.4);opacity:0;}
    100%{transform:scale(1);opacity:1;}
}

/* UI */
button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:#ff6fa5;
    color:white;
    cursor:pointer;
}

select{
    padding:5px;
    border-radius:8px;
}

.controls{
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div>
    <video id="video" autoplay></video>
    <div id="countdown"></div>

    <div class="controls">
        <button onclick="startCapture()">START 📸</button><br>

        Frame Color:
        <select id="frameColor" onchange="updateFrame()">
            <option value="#ffffff">White</option>
            <option value="#ffd1dc">Pink</option>
            <option value="#d1f0ff">Blue</option>
            <option value="#d1ffd6">Green</option>
            <option value="#fff0b3">Yellow</option>
            <option value="#e6ccff">Purple</option>
        </select>

        <br>
        <button onclick="downloadStrip()">Download PNG</button>
    </div>
</div>

<!-- PHOTOSTRIP -->
<div class="strip" id="strip">
    <h3>STEAM Exhibition 2026</h3>
    <div id="photos"></div>
</div>

</div>

<canvas id="canvas" style="display:none"></canvas>

<audio id="shutter" src="https://www.soundjay.com/camera/camera-shutter-click-01.mp3"></audio>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const photosDiv = document.getElementById("photos");
const countdownEl = document.getElementById("countdown");
const strip = document.getElementById("strip");
const shutter = document.getElementById("shutter");

let photos = [];

/* INIT CAMERA */
navigator.mediaDevices.getUserMedia({video:true})
.then(stream => video.srcObject = stream);

/* UPDATE FRAME COLOR LIVE */
function updateFrame(){
    let color = document.getElementById("frameColor").value;
    strip.style.background = color;
}

/* START CAPTURE */
async function startCapture(){
    photos = [];
    photosDiv.innerHTML = "";

    for(let i=0;i<4;i++){
        await countdown(3);
        takePhoto();
        await sleep(400);
    }
}

/* COUNTDOWN */
function countdown(sec){
    return new Promise(resolve=>{
        let count = sec;
        countdownEl.innerText = count;

        let interval = setInterval(()=>{
            count--;
            if(count<=0){
                clearInterval(interval);
                countdownEl.innerText="";
                resolve();
            }else{
                countdownEl.innerText = count;
                countdownEl.style.animation="none";
                countdownEl.offsetHeight;
                countdownEl.style.animation="pop 0.8s ease";
            }
        },1000);
    });
}

/* TAKE PHOTO */
function takePhoto(){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0);

    let data = canvas.toDataURL("image/png");
    photos.push(data);

    shutter.currentTime = 0;
    shutter.play();

    let img = document.createElement("img");
    img.src = data;
    img.className = "photo";

    photosDiv.appendChild(img);
}

/* DOWNLOAD PNG */
function downloadStrip(){
    let c = document.createElement("canvas");
    let cx = c.getContext("2d");

    let width = 400;
    let height = 1200;

    c.width = width;
    c.height = height;

    let frameColor = document.getElementById("frameColor").value;

    // background frame
    cx.fillStyle = frameColor;
    cx.fillRect(0,0,width,height);

    let y = 50;
    let loaded = 0;

    if(photos.length === 0){
        drawText();
        return;
    }

    photos.forEach((p)=>{
        let img = new Image();
        img.src = p;

        img.onload = ()=>{
            cx.drawImage(img,50,y,300,200);
            y += 250;
            loaded++;

            if(loaded === photos.length){
                drawText();
            }
        }
    });

    function drawText(){
        cx.fillStyle="black";
        cx.font="28px Arial";
        cx.fillText("STEAM Exhibition 2026",40,height-40);

        let link = document.createElement("a");
        link.download = "photostrip.png";
        link.href = c.toDataURL();
        link.click();
    }
}

/* UTILITY */
function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}

/* DEFAULT FRAME */
updateFrame();
</script>

</body>
</html>
