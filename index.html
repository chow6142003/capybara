<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Photobooth Capybara Pro</title>

<style>
body{
    margin:0;
    font-family:'Comic Sans MS', cursive;
    background: linear-gradient(135deg,#ffd6ec,#d6f0ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    display:flex;
    gap:20px;
}

/* VIDEO */
video{
    width:420px;
    border-radius:25px;
    border:6px solid white;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

/* STRIP */
.strip{
    width:240px;
    border-radius:25px;
    padding:10px;
    background:white;
    text-align:center;
    position:relative;
}

.photo{
    width:100%;
    margin:5px 0;
    border-radius:12px;
}

/* COUNTDOWN */
#countdown{
    position:absolute;
    font-size:120px;
    color:white;
    font-weight:bold;
    text-shadow:0 0 20px black;
    animation: pop 1s ease;
}

@keyframes pop{
    0%{transform:scale(0.5);opacity:0;}
    100%{transform:scale(1);opacity:1;}
}

/* BUTTON */
button{
    padding:10px 18px;
    border:none;
    border-radius:15px;
    background:#ff8ec7;
    color:white;
    cursor:pointer;
    font-size:15px;
    margin:5px;
}

select{
    padding:5px;
    border-radius:10px;
}

/* STICKERS */
.sticker{
    position:absolute;
    width:60px;
    cursor:grab;
}

/* PANEL */
.controls{
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div>
    <video id="video" autoplay></video>
    <div id="countdown"></div>

    <div class="controls">
        <button onclick="startCapture()">START 📸</button><br>

        🎨 Frame:
        <select id="frameColor">
            <option value="#fff">Putih</option>
            <option value="#ffd1dc">Pink</option>
            <option value="#d1f0ff">Biru</option>
            <option value="#d1ffd6">Hijau</option>
            <option value="#fff0b3">Kuning</option>
            <option value="#f3d1ff">Ungu</option>
            <option value="#ffe4c4">Peach</option>
            <option value="#c4fff9">Mint</option>
            <option value="#ffc4c4">Soft Red</option>
            <option value="#e0e0e0">Grey</option>
        </select>

        <br>

        🧵 Pattern:
        <select id="pattern">
            <option value="none">None</option>
            <option value="dots">Dots</option>
            <option value="stripes">Stripes</option>
        </select>

        <br>

        🐹 Sticker:
        <button onclick="addSticker()">Tambah</button>

        <br>
        <button onclick="downloadStrip()">Download PNG</button>
    </div>
</div>

<div class="strip" id="strip">
    <h3>🐹 Pameran STEAM 2026</h3>
    <div id="photos"></div>
</div>

</div>

<canvas id="canvas" style="display:none"></canvas>
<audio id="shutter" src="https://www.soundjay.com/camera/camera-shutter-click-01.mp3"></audio>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const photosDiv = document.getElementById("photos");
const countdownEl = document.getElementById("countdown");
const strip = document.getElementById("strip");
const shutter = document.getElementById("shutter");

let photos=[];

/* WEBCAM */
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>video.srcObject=stream);

/* CAPTURE */
async function startCapture(){
    photos=[];
    photosDiv.innerHTML="";
    for(let i=0;i<4;i++){
        await countdown(3);
        takePhoto();
        await sleep(500);
    }
}

/* COUNTDOWN */
function countdown(sec){
    return new Promise(resolve=>{
        let count=sec;
        countdownEl.innerText=count;
        let int=setInterval(()=>{
            count--;
            if(count<=0){
                clearInterval(int);
                countdownEl.innerText="";
                resolve();
            }else{
                countdownEl.innerText=count;
            }
        },1000);
    });
}

/* TAKE PHOTO */
function takePhoto(){
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;

    ctx.drawImage(video,0,0);
    let data=canvas.toDataURL("image/png");

    photos.push(data);

    shutter.currentTime=0;
    shutter.play();

    let img=document.createElement("img");
    img.src=data;
    img.className="photo";
    photosDiv.appendChild(img);
}

/* STICKER */
function addSticker(){
    let s=document.createElement("img");
    s.src="https://i.imgur.com/4AiXzf8.png";
    s.className="sticker";
    s.style.top="50px";
    s.style.left="50px";

    strip.appendChild(s);

    dragElement(s);
}

/* DRAG */
function dragElement(el){
    el.onmousedown=function(e){
        e.preventDefault();
        document.onmousemove=function(e){
            el.style.top=(el.offsetTop + e.movementY)+"px";
            el.style.left=(el.offsetLeft + e.movementX)+"px";
        }
        document.onmouseup=function(){
            document.onmousemove=null;
        }
    }
}

/* DOWNLOAD */
function downloadStrip(){
    let c=document.createElement("canvas");
    let cx=c.getContext("2d");

    c.width=400;
    c.height=1200;

    let color=document.getElementById("frameColor").value;
    cx.fillStyle=color;
    cx.fillRect(0,0,c.width,c.height);

    let y=50;

    photos.forEach((p,i)=>{
        let img=new Image();
        img.src=p;
        img.onload=()=>{
            cx.drawImage(img,50,y,300,200);
        }
        y+=250;
    });

    cx.fillStyle="black";
    cx.font="28px Comic Sans MS";
    cx.fillText("Pameran STEAM 2026",40,1150);

    let link=document.createElement("a");
    link.download="photobooth.png";
    link.href=c.toDataURL();
    link.click();
}

/* SLEEP */
function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}
</script>

</body>
</html>
