<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Photobooth Capybara</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f5f5;
}

video, canvas {
    border-radius: 10px;
    margin-top: 10px;
}

#countdown {
    font-size: 80px;
    color: red;
    position: absolute;
    top: 30%;
    left: 45%;
    display: none;
}

.controls {
    margin: 10px;
}

.photostrip {
    background: white;
    padding: 10px;
    width: 200px;
    margin: auto;
    border: 10px solid black;
}

.photo {
    width: 100%;
    margin-bottom: 10px;
    border-radius: 8px;
}

/* capybara sticker */
.sticker {
    position: absolute;
    width: 80px;
    bottom: 10px;
    right: 10px;
}
</style>
</head>

<body>

<h2>📸 Photobooth Capybara</h2>

<div class="controls">
    <button onclick="startCamera()">Start Camera</button>
    <button onclick="startPhotobooth()">Start Photobooth</button>

    <br><br>
    Pilih warna frame:
    <input type="color" id="frameColor" value="#000000">
</div>

<div style="position:relative; display:inline-block;">
    <video id="video" width="300" autoplay></video>
    <div id="countdown">3</div>
</div>

<br>

<div id="result"></div>

<br>
<button onclick="downloadStrip()">Download</button>

<!-- sound -->
<audio id="snapSound" src="https://www.soundjay.com/camera/camera-click-01.mp3"></audio>

<script>
let video = document.getElementById("video");
let countdownEl = document.getElementById("countdown");
let snapSound = document.getElementById("snapSound");
let photos = [];

async function startCamera() {
    let stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
}

async function startPhotobooth() {
    photos = [];
    document.getElementById("result").innerHTML = "";

    for (let i = 0; i < 4; i++) {
        await countdown(3);
        takePhoto();
        await sleep(500);
    }

    displayPhotos();
}

function countdown(num) {
    return new Promise(resolve => {
        countdownEl.style.display = "block";
        let count = num;

        let interval = setInterval(() => {
            countdownEl.innerText = count;
            count--;

            if (count < 0) {
                clearInterval(interval);
                countdownEl.style.display = "none";
                resolve();
            }
        }, 1000);
    });
}

function takePhoto() {
    let canvas = document.createElement("canvas");
    canvas.width = 300;
    canvas.height = 225;
    let ctx = canvas.getContext("2d");

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // capybara sticker (emoji fallback)
    ctx.font = "40px Arial";
    ctx.fillText("🦫", 240, 200);

    photos.push(canvas.toDataURL("image/png"));

    snapSound.play();
}

function displayPhotos() {
    let frameColor = document.getElementById("frameColor").value;

    let container = document.createElement("div");
    container.className = "photostrip";
    container.style.borderColor = frameColor;

    photos.forEach(p => {
        let img = document.createElement("img");
        img.src = p;
        img.className = "photo";
        container.appendChild(img);
    });

    let text = document.createElement("p");
    text.innerHTML = "<b>Pameran STEAM 2026</b>";
    container.appendChild(text);

    document.getElementById("result").appendChild(container);
}

function downloadStrip() {
    let canvas = document.createElement("canvas");
    let ctx = canvas.getContext("2d");

    canvas.width = 300;
    canvas.height = 1000;

    let y = 0;

    let loadImages = photos.map(src => {
        return new Promise(resolve => {
            let img = new Image();
            img.src = src;
            img.onload = () => resolve(img);
        });
    });

    Promise.all(loadImages).then(images => {
        images.forEach(img => {
            ctx.drawImage(img, 0, y, 300, 225);
            y += 240;
        });

        ctx.fillStyle = "black";
        ctx.font = "20px Arial";
        ctx.fillText("Pameran STEAM 2026", 30, y + 30);

        let link = document.createElement("a");
        link.download = "photobooth.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}
</script>

</body>
</html>
